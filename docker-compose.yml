services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    environment:
      - MODE=normal
    ports:
      - "8080:8080"
    volumes:
      - ./signal-cli-config:/home/.local/share/signal-cli
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  signal-bot:
    build: .
    restart: unless-stopped
    environment:
      - SIGNAL_API_URL=http://signal-api:8080
      - OPEN_WEBUI_URL=http://host.docker.internal:3000
      - OPEN_WEBUI_API_KEY=  # Set your Open WebUI API key
      - OLLAMA_MODEL=gpt-oss:20b
      - SIGNAL_PHONE_NUMBER=+1234567890  # Replace with your Signal phone number
      - SCHEDULE=weekly
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      signal-api:
        condition: service_healthy
